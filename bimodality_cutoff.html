<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Cq Bimodality + Cutoff CI</title>
</head>
<body>
    <h2>Cq Bimodality Analyzer v0.16 </h2>
    <div>
        <input type="file" id="fileInput" accept=".csv"> (or drop CSV anywhere)<br>
        <label>Column: <select id="colSelect" disabled><option>Upload CSV first</option></select></label>
        <label>Keep &lt; <input type="number" id="threshold" value="40" step="0.1" min="0" style="width:70px"></label><br>
        <label>X min: <input type="number" id="xmin" placeholder="15" step="0.1" style="width:70px"></label>
        <label>X max: <input type="number" id="xmax" placeholder="40" step="0.1" style="width:70px"></label>
        <label>Y min: <input type="number" id="ymin" placeholder="0" step="any" style="width:70px"></label>
        <label>Y max: <input type="number" id="ymax" placeholder="auto" step="any" style="width:70px"></label><br>
        <button id="analyzeBtn" disabled>Analyze</button>
    </div>
    <div id="plotContainer"></div>
    <pre id="results"></pre>

    <script type="module">
        import { WebR } from 'https://webr.r-wasm.org/latest/webr.mjs';

        const fileInput = document.getElementById('fileInput');
        const colSelect = document.getElementById('colSelect');
        const thresholdInput = document.getElementById('threshold');
        const xminInput = document.getElementById('xmin');
        const xmaxInput = document.getElementById('xmax');
        const yminInput = document.getElementById('ymin');
        const ymaxInput = document.getElementById('ymax');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const plotContainer = document.getElementById('plotContainer');
        const resultsPre = document.getElementById('results');

        let webR;
        let csvText = '';
        let csvDelimiter = ',';

        document.body.addEventListener('dragover', e => e.preventDefault());
        document.body.addEventListener('drop', e => {
            e.preventDefault();
            if (e.dataTransfer.files.length) processFile(e.dataTransfer.files[0]);
        });

        function processFile(file) {
            if (!file.name.toLowerCase().endsWith('.csv')) return alert('Only CSV files allowed');
            const reader = new FileReader();
            reader.onload = ev => {
                csvText = ev.target.result.replace(/^\uFEFF/, '');
                const { cols, rows, delim } = parseCSV(csvText);
                csvDelimiter = delim;
                colSelect.innerHTML = '<option value="">-- Select column --</option>';
                cols.forEach(col => {
                    const o = document.createElement('option');
                    o.value = col;
                    o.textContent = col;
                    if (col.toLowerCase().includes('cq') || col.toLowerCase().includes('ct')) o.selected = true;
                    colSelect.appendChild(o);
                });
                colSelect.disabled = false;
                analyzeBtn.disabled = false;
                resultsPre.textContent = '';
                plotContainer.innerHTML = '';
            };
            reader.readAsText(file);
        }

        fileInput.addEventListener('change', e => {
            if (e.target.files.length) processFile(e.target.files[0]);
        });

        function parseCSV(text) {
            const lines = text.trim().split(/\r?\n/);
            if (!lines.length) return { cols: [], rows: 0, delim: ',' };
            let delim = ',';
            const first = lines[0];
            if (first.includes('\t')) delim = '\t';
            else if (first.includes(';')) delim = ';';
            const headers = first.split(delim).map(h => h.trim().replace(/^["']|["']$/g, ''));
            return { cols: headers, rows: lines.length - 1, delim };
        }

        function buildRCode(column, threshold, delimiter, xmin, xmax, ymin, ymax) {
            const safeCol = column.replace(/\\/g, '\\\\').replace(/"/g, '\\"');
            const rSep = delimiter === '\t' ? '\\t' : delimiter;

            // Handle empty/invalid axis limits – convert to NA for R
            const xlimStr = (xmin !== '' && xmax !== '') ? `c(${xmin}, ${xmax})` : 'NULL';
            const ylimStr = (ymin !== '' && ymax !== '') ? `c(${ymin}, ${ymax})` : 'NULL';

            return `
            rawToBase64 <- function(x) {
              if (length(x) == 0) return("")
              b64chars <- c(LETTERS, letters, 0:9, '+', '/')
              n <- length(x)
              x <- as.integer(x)
              ngroups <- floor(n / 3)
              remainder <- n %% 3
              res <- character(0)
              for (i in seq_len(ngroups)) {
                idx <- (i-1)*3 + 1
                b <- x[idx:(idx+2)]
                bits24 <- b[1]*256*256 + b[2]*256 + b[3]
                res <- c(res,
                         b64chars[ bitwAnd(bitwShiftR(bits24, 18), 63L) + 1L ],
                         b64chars[ bitwAnd(bitwShiftR(bits24, 12), 63L) + 1L ],
                         b64chars[ bitwAnd(bitwShiftR(bits24,  6), 63L) + 1L ],
                         b64chars[ bitwAnd(bits24, 63L) + 1L ])
              }
              if (remainder == 1) {
                last <- x[n]
                bits24 <- last * 256 * 256
                res <- c(res,
                         b64chars[ bitwAnd(bitwShiftR(bits24, 18), 63L) + 1L ],
                         b64chars[ bitwAnd(bitwShiftR(bits24, 12), 63L) + 1L ],
                         '=', '=')
              } else if (remainder == 2) {
                b <- x[(n-1):n]
                bits24 <- b[1]*256*256 + b[2]*256
                res <- c(res,
                         b64chars[ bitwAnd(bitwShiftR(bits24, 18), 63L) + 1L ],
                         b64chars[ bitwAnd(bitwShiftR(bits24, 12), 63L) + 1L ],
                         b64chars[ bitwAnd(bitwShiftR(bits24,  6), 63L) + 1L ],
                         '=')
              }
              paste(res, collapse = "")
            }

            dt <- read.csv('/data.csv', stringsAsFactors = FALSE, check.names = FALSE, sep = '${rSep}')
            if (!("${safeCol}" %in% names(dt))) stop("Column not found: ${safeCol}")

            x_raw <- suppressWarnings(as.numeric(dt[["${safeCol}"]]))
            x_raw <- x_raw[!is.na(x_raw)]
            thresh <- ${threshold}
            if (!is.finite(thresh)) thresh <- Inf
            x <- x_raw[x_raw < thresh]
            n_used <- length(x)
            if (n_used < 20) stop("Too few data points: ", n_used)

            em_two_normals <- function(x, max_iter = 800, tol = 1e-6, n_starts = 3) {
                n <- length(x)
                best_res <- NULL
                best_ll <- -Inf
                for(start in 1:n_starts) {
                    sp <- if(start == 1) median(x) else if(start == 2) quantile(x, 0.45) else quantile(x, 0.35 + 0.05*start)
                    g1 <- x[x <= sp]
                    g2 <- x[x > sp]
                    if(length(g1) < 3 || length(g2) < 3) next
                    mu1 <- mean(g1); mu2 <- mean(g2)
                    sigma1 <- max(sd(g1), 0.01); sigma2 <- max(sd(g2), 0.01)
                    lambda1 <- length(g1)/n; lambda2 <- 1 - lambda1
                    ll_old <- -Inf
                    for(iter in 1:max_iter) {
                        resp1 <- lambda1 * dnorm(x, mu1, sigma1)
                        resp2 <- lambda2 * dnorm(x, mu2, sigma2)
                        total <- resp1 + resp2; total[total < 1e-300] <- 1e-300
                        resp1 <- resp1/total; resp2 <- resp2/total
                        lambda1 <- mean(resp1); lambda2 <- 1 - lambda1
                        mu1 <- sum(resp1 * x)/sum(resp1)
                        mu2 <- sum(resp2 * x)/sum(resp2)
                        sigma1 <- sqrt(sum(resp1*(x - mu1)^2)/sum(resp1))
                        sigma2 <- sqrt(sum(resp2*(x - mu2)^2)/sum(resp2))
                        if(sigma1 < 0.005) sigma1 <- 0.01
                        if(sigma2 < 0.005) sigma2 <- 0.01
                        if(lambda1 < 0.02) lambda1 <- 0.02
                        if(lambda1 > 0.98) lambda1 <- 0.98
                        lambda2 <- 1 - lambda1
                        ll_new <- sum(log(lambda1*dnorm(x, mu1, sigma1) + lambda2*dnorm(x, mu2, sigma2)))
                        if(abs(ll_new - ll_old) < tol) break
                        ll_old <- ll_new
                    }
                    if(is.finite(ll_old) && ll_old > best_ll) {
                        best_ll <- ll_old
                        best_res <- list(mu1 = mu1, mu2 = mu2, sigma1 = sigma1, sigma2 = sigma2,
                                         lambda1 = lambda1, lambda2 = lambda2, logLik = ll_old, iter = iter)
                    }
                }
                if(is.null(best_res)) {
                    m <- median(x); g1 <- x[x <= m]; g2 <- x[x > m]
                    best_res <- list(mu1 = mean(g1), mu2 = mean(g2),
                                     sigma1 = max(sd(g1), 0.05), sigma2 = max(sd(g2), 0.05),
                                     lambda1 = length(g1)/n, lambda2 = length(g2)/n, logLik = -Inf, iter = 0)
                }
                if(best_res$mu1 > best_res$mu2) {
                    tmp <- best_res$mu1; best_res$mu1 <- best_res$mu2; best_res$mu2 <- tmp
                    tmp <- best_res$sigma1; best_res$sigma1 <- best_res$sigma2; best_res$sigma2 <- tmp
                    tmp <- best_res$lambda1; best_res$lambda1 <- best_res$lambda2; best_res$lambda2 <- tmp
                }
                best_res
            }

            find_cutoffs <- function(mu1, mu2, sigma1, sigma2, lambda1) {
                lambda2 <- 1 - lambda1
                f <- function(x) lambda1*dnorm(x, mu1, sigma1) - lambda2*dnorm(x, mu2, sigma2)
                lo <- min(mu1 - 4*sigma1, mu2 - 4*sigma2)
                hi <- max(mu1 + 4*sigma1, mu2 + 4*sigma2)
                grid <- seq(lo, hi, length.out = 300)
                vals <- sapply(grid, f)
                roots <- c()
                for(i in 1:(length(grid)-1)) {
                    if(is.finite(vals[i]) && is.finite(vals[i+1]) && vals[i]*vals[i+1] <= 0) {
                        tryCatch({
                            r <- uniroot(f, c(grid[i], grid[i+1]), tol = 1e-6)$root
                            if(length(roots) == 0 || min(abs(r - roots)) > 0.05) roots <- c(roots, r)
                        }, error = function(e) {})
                    }
                }
                if(length(roots) == 0) roots <- (mu1*lambda2 + mu2*lambda1)/(lambda1 + lambda2)
                sort(roots)
            }

            em <- em_two_normals(x)
            bic1 <- -2*sum(dnorm(x, mean(x), sd(x), log = TRUE)) + 2*log(n_used)
            bic2 <- -2*em$logLik + 5*log(n_used)
            bic_diff <- bic1 - bic2
            separation <- abs(em$mu1 - em$mu2)/sqrt((em$sigma1^2 + em$sigma2^2)/2)

            verdict <- if (bic_diff > 10 && separation > 2) {
              "Strongly Bimodal"
            } else if (bic_diff > 6 && separation > 1.5) {
              "Moderately Bimodal"
            } else if (bic_diff > 2 && separation > 1) {
              "Weakly Bimodal"
            } else {
              "Not Clearly Bimodal"
            }

            cutoffs <- find_cutoffs(em$mu1, em$mu2, em$sigma1, em$sigma2, em$lambda1)
            main_cutoff <- if(length(cutoffs) > 0) cutoffs[1] else NA

            # Parametric bootstrap CI
            boot_ci <- NULL
            if(bic_diff > 2 && separation > 1 && !is.na(main_cutoff)) {
                set.seed(42)
                n_boot <- 200
                boot_cut <- replicate(n_boot, {
                    z <- rbinom(n_used, 1, em$lambda1)
                    xb <- ifelse(z == 1, rnorm(n_used, em$mu1, em$sigma1),
                                        rnorm(n_used, em$mu2, em$sigma2))
                    emb <- try(em_two_normals(xb), silent = TRUE)
                    if(inherits(emb, "try-error")) return(NA)
                    cb <- try(find_cutoffs(emb$mu1, emb$mu2, emb$sigma1, emb$sigma2, emb$lambda1), silent = TRUE)
                    if(inherits(cb, "try-error") || length(cb) == 0) return(NA)
                    cb[1]
                })
                boot_cut <- boot_cut[!is.na(boot_cut)]
                if(length(boot_cut) >= 5) {
                    boot_ci <- quantile(boot_cut, c(0.025, 0.975))
                }
            }

            # Handle axis limits
            xlim <- ${xlimStr}
            ylim <- ${ylimStr}
            if (!is.null(xlim)) {
                x <- x[x >= xlim[1] & x <= xlim[2]]
                if (length(x) < 5) stop("Too few data points within the specified x-axis limits.")
                # Update counts after subsetting
                n_used <- length(x)
                # Recompute model on trimmed data?
                em <- em_two_normals(x)
                bic1 <- -2*sum(dnorm(x, mean(x), sd(x), log = TRUE)) + 2*log(n_used)
                bic2 <- -2*em$logLik + 5*log(n_used)
                bic_diff <- bic1 - bic2
                separation <- abs(em$mu1 - em$mu2)/sqrt((em$sigma1^2 + em$sigma2^2)/2)
                verdict <- if (bic_diff > 10 && separation > 2) {
                  "Strongly Bimodal"
                } else if (bic_diff > 6 && separation > 1.5) {
                  "Moderately Bimodal"
                } else if (bic_diff > 2 && separation > 1) {
                  "Weakly Bimodal"
                } else {
                  "Not Clearly Bimodal"
                }
                cutoffs <- find_cutoffs(em$mu1, em$mu2, em$sigma1, em$sigma2, em$lambda1)
                main_cutoff <- if(length(cutoffs) > 0) cutoffs[1] else NA
            }

            # Create plot
            png('/tmp/plot.png', width = 700, height = 450)
            par(mar = c(4.5,4.5,2.5,1.5))
            hist(x, breaks = min(80, max(30, round(n_used/8))), freq = FALSE,
                 col = "#dfe6e9", border = "white", xlab = "Cq Value", ylab = "Density",
                 main = paste0("Cq Distribution (n = ", n_used, ")"),
                 xlim = xlim, ylim = ylim)
            if (!is.null(xlim)) {
                xx <- seq(xlim[1], xlim[2], length.out = 400)
            } else {
                xx <- seq(min(x)-0.5, max(x)+0.5, length.out = 400)
            }
            comp1 <- em$lambda1 * dnorm(xx, em$mu1, em$sigma1)
            comp2 <- em$lambda2 * dnorm(xx, em$mu2, em$sigma2)
            lines(xx, comp1, col = "#0984e3", lwd = 2, lty = 2)
            lines(xx, comp2, col = "#00b894", lwd = 2, lty = 2)
            lines(xx, comp1 + comp2, col = "#e17055", lwd = 2.5)
            for(v in cutoffs) abline(v = v, lty = 2, lwd = 2, col = "#6c5ce7")
            if(length(cutoffs) >= 2) {
                idx <- which(xx >= cutoffs[1] & xx <= cutoffs[2])
                polygon(c(cutoffs[1], xx[idx], cutoffs[2]),
                        c(0, (comp1 + comp2)[idx], 0),
                        col = rgb(108,92,231,30,maxColorValue=255), border = NA)
            }
            legend("topright", c("Comp.1","Comp.2","Mixture","Cutoff"),
                   col = c("#0984e3","#00b894","#e17055","#6c5ce7"),
                   lwd = c(2,2,2.5,2), lty = c(2,2,1,2), bg = "white", box.lwd = 0.5, cex = 0.85)
            dev.off()

            raw_png <- readBin('/tmp/plot.png', 'raw', file.size('/tmp/plot.png'))
            plot_b64 <- rawToBase64(raw_png)

            list(
                verdict = verdict,
                bic1 = bic1,
                bic2 = bic2,
                bic_diff = bic_diff,
                separation = separation,
                mu1 = em$mu1,
                mu2 = em$mu2,
                sigma1 = em$sigma1,
                sigma2 = em$sigma2,
                lambda1 = em$lambda1,
                lambda2 = em$lambda2,
                cutoff = paste(round(cutoffs, 3), collapse = ", "),
                main_cutoff = main_cutoff,
                ci_lower = if(!is.null(boot_ci)) boot_ci[1] else NA,
                ci_upper = if(!is.null(boot_ci)) boot_ci[2] else NA,
                plot_b64 = plot_b64,
                n_used = n_used,
                n_original = length(x_raw),
                iter = em$iter
            )
            `;
        }

        async function analyze() {
            const column = colSelect.value;
            const threshold = parseFloat(thresholdInput.value) || 40;
            const xmin = xminInput.value.trim();
            const xmax = xmaxInput.value.trim();
            const ymin = yminInput.value.trim();
            const ymax = ymaxInput.value.trim();
            if (!column || !csvText) return alert('Upload CSV and select column');

            resultsPre.textContent = 'Fitting model…';
            plotContainer.innerHTML = '';

            try {
                await webR.FS.writeFile('/data.csv', new TextEncoder().encode(csvText));

                const rCode = buildRCode(column, threshold, csvDelimiter, xmin, xmax, ymin, ymax);
                const result = await webR.evalR(rCode);

                const extract = async (name, type = 'string') => {
                    const obj = await result.get(name);
                    return type === 'number' ? await obj.toNumber() : await obj.toString();
                };

                const verdict = await extract('verdict');
                const bic1 = await extract('bic1', 'number');
                const bic2 = await extract('bic2', 'number');
                const bicDiff = await extract('bic_diff', 'number');
                const separation = await extract('separation', 'number');
                const mu1 = await extract('mu1', 'number');
                const mu2 = await extract('mu2', 'number');
                const sigma1 = await extract('sigma1', 'number');
                const sigma2 = await extract('sigma2', 'number');
                const lambda1 = await extract('lambda1', 'number');
                const cutoffStr = await extract('cutoff');
                const mainCutoff = parseFloat(await extract('main_cutoff'));
                const ciLow = parseFloat(await extract('ci_lower'));
                const ciUp = parseFloat(await extract('ci_upper'));
                const plotB64 = await extract('plot_b64');
                const nUsed = await extract('n_used', 'number');
                const nOrig = await extract('n_original', 'number');
                const iter = await extract('iter', 'number');

                const img = document.createElement('img');
                img.src = 'data:image/png;base64,' + plotB64;
                img.style.maxWidth = '100%';
                plotContainer.innerHTML = '';
                plotContainer.appendChild(img);

                let txt = `Verdict: ${verdict}\n\n`;
                txt += `Data points: ${nUsed} used (from ${nOrig})\n`;
                txt += `EM iterations: ${iter}\n\n`;
                txt += `--- Single Normal (1 comp) ---\n`;
                txt += `BIC = ${bic1.toFixed(2)}\n\n`;
                txt += `--- Mixture Model (2 comp) ---\n`;
                txt += `BIC = ${bic2.toFixed(2)}\n`;
                txt += `ΔBIC = ${bicDiff.toFixed(2)}   (positive favours bimodal)\n`;
                txt += `Separation = ${separation.toFixed(3)}\n\n`;
                txt += `Component 1: mean = ${mu1.toFixed(3)}, SD = ${sigma1.toFixed(3)}, weight = ${(lambda1*100).toFixed(1)}%\n`;
                txt += `Component 2: mean = ${mu2.toFixed(3)}, SD = ${sigma2.toFixed(3)}, weight = ${((1-lambda1)*100).toFixed(1)}%\n\n`;
                txt += `Cutoff(s): ${cutoffStr}\n`;
                if (!isNaN(mainCutoff) && verdict !== 'Not Clearly Bimodal' && !isNaN(ciLow)) {
                    txt += `   Primary cutoff = ${mainCutoff.toFixed(3)}   (95% CI: ${ciLow.toFixed(3)} – ${ciUp.toFixed(3)})\n`;
                } else {
                    txt += `   No CI computed (bimodality not strong enough or bootstrap failed).\n`;
                }

                resultsPre.textContent = txt;
            } catch (err) {
                resultsPre.textContent = 'Error: ' + err.message;
                plotContainer.innerHTML = '<p>Analysis failed.</p>';
            }
        }

        analyzeBtn.addEventListener('click', analyze);

        (async () => {
            try {
                webR = new WebR({ interactive: false });
                await webR.init();
            } catch(e) {
                alert('WebR failed to initialise');
            }
        })();
    </script>
    <footer style="margin-top: 40px; padding: 16px; text-align: center; border-top: 1px solid #ccc; font-size: 0.8rem; color: #666;">
        citation: Trang et al. Epidemiology & Infection (2015) (above-displayed method was adapted from this paper)
    </footer>
</body>
</html>

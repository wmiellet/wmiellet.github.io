<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LinRegPCR estimation</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; }
    button, select, input { margin: 0.3rem; }
    pre { background: #f5f5f5; padding: 1rem; white-space: pre-wrap; }
    canvas { border: 1px solid #ccc; margin-top: 1rem; max-width: 100%; }
  </style>
</head>
<body>
  <h2>LinRegPCR Efficiency (adapted from Ruijter et al. 2009) v0.20</h2>

  <label>Upload CSV/TSV file:</label><br>
  <input type="file" id="csvFile" accept=".csv,.tsv,.txt"><br>

  <label for="wellSelect">Select well:</label>
  <select id="wellSelect" disabled>
    <option>-- Upload file first --</option>
  </select><br>

  <button id="runBtn" disabled>Run LinRegPCR</button>
  <hr>

  <h3>Efficiency Result</h3>
  <pre id="resultText">Upload a file and click Run.</pre>

  <h3>Plot</h3>
  <canvas id="plotCanvas" width="600" height="500" style="display:none;"></canvas>

  <script>
    // ===================== LinRegPCR (JavaScript) =====================
    function sg5_d2(y) {
      const coef = [2, -1, -2, -1, 2];
      const n = y.length;
      const d2 = new Array(n).fill(NaN);
      for (let i = 2; i < n - 2; i++) {
        let sum = 0;
        for (let j = -2; j <= 2; j++) {
          sum += coef[j + 2] * y[i + j];
        }
        d2[i] = sum / 7;
      }
      return d2;
    }

    function indexOfMax(arr) {
      let maxIdx = -1, maxVal = -Infinity;
      for (let i = 0; i < arr.length; i++) {
        if (!isNaN(arr[i]) && arr[i] > maxVal) {
          maxVal = arr[i]; maxIdx = i;
        }
      }
      return maxIdx;
    }

    function linreg_ruijter4_final(cycle, F_raw, tol = 1e-6) {
      const n = F_raw.length;
      const early5 = F_raw.slice(0, Math.min(5, n)).reduce((a,b)=>a+b,0)/Math.min(5,n);
      if ((Math.max(...F_raw) - Math.min(...F_raw)) < 0.1 * early5) {
        return {
          baseline: early5, background: early5,
          F_corr: F_raw.map(v => v - early5),
          SDM_initial: NaN, SDM_final: NaN,
          WoL_cycles: [], window_width: NaN,
          slope: NaN, E: 1.0, Eff_pct: 0,
          CV_slope: NaN, R_squared: NaN, converged: false
        };
      }

      const B_init = Math.min(...F_raw);
      const F_corr_init = F_raw.map(v => v - B_init);
      const pos = F_corr_init.filter(v => v > 0);
      if (pos.length === 0 || Math.max(...F_corr_init) < 7 * Math.min(...pos)) {
        throw new Error("No amplification");
      }

      const d2_init = sg5_d2(F_corr_init);
      let SDM_init = indexOfMax(d2_init);
      if (SDM_init === -1 || SDM_init < 4) throw new Error("SDM too early");

      const widths_to_test = [4, 6];
      let best_overall_CV = Infinity;
      let best_result = null;
      const bg_median = F_raw.slice(0, Math.min(5,n)).sort((a,b)=>a-b)[Math.floor(Math.min(5,n)/2)];

      function slope_diff_fn(Bcur, WoL_tentative) {
        const F_win = WoL_tentative.map(i => F_raw[i] - Bcur);
        if (F_win.some(v => v <= 0)) return NaN;
        const lnF = F_win.map(Math.log);
        const half = Math.floor(WoL_tentative.length / 2);
        const cyc_win = WoL_tentative.map(i => cycle[i]);
        function fit(x, y) {
          const n = x.length;
          const sumX = x.reduce((a,b)=>a+b,0);
          const sumY = y.reduce((a,b)=>a+b,0);
          const sumXY = x.reduce((a,b,i)=>a+b*y[i],0);
          const sumXX = x.reduce((a,b)=>a+b*b,0);
          return (n*sumXY - sumX*sumY) / (n*sumXX - sumX*sumX);
        }
        const slope_low = fit(cyc_win.slice(0,half), lnF.slice(0,half));
        const slope_upp = fit(cyc_win.slice(half), lnF.slice(half));
        return slope_upp - slope_low;
      }

      for (const width of widths_to_test) {
        const start = SDM_init - width;
        if (start < 0) continue;
        const WoL_tentative = Array.from({length: width}, (_,i) => start + i);

        let Bcur = B_init;
        let best_diff = Infinity;
        let best_B = Bcur;
        let converged = false;
        let B_found = null;
        for (let iter = 0; iter < 100; iter++) {
          const d = slope_diff_fn(Bcur, WoL_tentative);
          if (isNaN(d)) break;
          const ad = Math.abs(d);
          if (ad < best_diff) { best_diff = ad; best_B = Bcur; }
          if (ad < tol) { B_found = Bcur; converged = true; break; }
          if (d > tol) { Bcur *= 1.001; } else { Bcur *= 0.999; }
        }
        if (!converged && best_diff < Infinity) { B_found = best_B; converged = false; }
        if (B_found === null) continue;

        const F_corr = F_raw.map(v => v - B_found);
        const d2_final = sg5_d2(F_corr);
        let SDM_final = indexOfMax(d2_final);
        if (SDM_final === -1 || SDM_final < 4) continue;

        let best_CV = Infinity;
        let best_WoL = null;
        let best_fit = null;
        for (let end = SDM_final - 1; end >= width-1; end--) {
          const start_w = end - width + 1;
          if (start_w < 0) break;
          const F_win = F_corr.slice(start_w, end+1);
          if (F_win.some(v => v <= 0)) continue;
          const lnF = F_win.map(Math.log);
          const cyc_win = cycle.slice(start_w, end+1);
          const n_win = cyc_win.length;
          const sumX = cyc_win.reduce((a,b)=>a+b,0);
          const sumY = lnF.reduce((a,b)=>a+b,0);
          const sumXY = cyc_win.reduce((a,b,i)=>a+b*lnF[i],0);
          const sumXX = cyc_win.reduce((a,b)=>a+b*b,0);
          const denom = n_win*sumXX - sumX*sumX;
          if (denom === 0) continue;
          const slope = (n_win*sumXY - sumX*sumY) / denom;
          if (slope === 0) continue;
          const intercept = (sumY - slope*sumX) / n_win;
          const yPred = cyc_win.map(x => intercept + slope*x);
          const ssRes = lnF.reduce((a,b,i)=>a+(b-yPred[i])**2,0);
          const meanY = sumY / n_win;
          const ssTot = lnF.reduce((a,b)=>a+(b-meanY)**2,0);
          const R_squared = ssTot === 0 ? 1 : 1 - ssRes/ssTot;
          const se = Math.sqrt(ssRes/(n_win-2)) / Math.sqrt(cyc_win.reduce((a,b)=>a+(b-sumX/n_win)**2,0));
          const CV = se / Math.abs(slope);
          if (isNaN(CV)) continue;
          if (CV < best_CV) {
            best_CV = CV;
            best_WoL = Array.from({length: width}, (_,i) => start_w + i);
            best_fit = { slope, E: Math.exp(slope), R_squared, se, CV };
          }
        }
        if (best_WoL === null) continue;

        const { slope, E, R_squared, se, CV } = best_fit;
        const candidate = {
          baseline: B_found,
          background: bg_median,
          F_corr: F_corr,
          SDM_initial: SDM_init + 1,
          SDM_final: SDM_final + 1,
          WoL_cycles: best_WoL.map(i => i + 1),
          window_width: width,
          slope: slope,
          E: E,
          Eff_pct: (E - 1) * 100,
          CV_slope: CV,
          R_squared: R_squared,
          converged: converged
        };
        if (CV < best_overall_CV) {
          best_overall_CV = CV;
          best_result = candidate;
        }
      }

      if (best_result === null) throw new Error("No valid window found");
      return best_result;
    }

    // ===================== File handling & data-points plot =====================
    const fileInput   = document.getElementById('csvFile');
    const wellSelect  = document.getElementById('wellSelect');
    const runBtn      = document.getElementById('runBtn');
    const resultText  = document.getElementById('resultText');
    const plotCanvas  = document.getElementById('plotCanvas');
    const ctx = plotCanvas.getContext('2d');

    let parsedData = null;

    fileInput.addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        const text = ev.target.result;
        const sep = text.includes('\t') ? '\t' : ',';
        const lines = text.trim().split('\n');
        const headers = lines[0].split(sep).map(h => h.trim().replace(/"/g, ''));
        const cycles = [];
        const wells = {};
        for (let i = 1; i < headers.length; i++) wells[headers[i]] = [];

        for (let i = 1; i < lines.length; i++) {
          const vals = lines[i].split(sep).map(v => v.trim());
          if (vals.length < headers.length) continue;
          cycles.push(Number(vals[0]));
          for (let j = 1; j < headers.length; j++) {
            wells[headers[j]].push(Number(vals[j]));
          }
        }
        parsedData = { cycles, wells };
        wellSelect.innerHTML = '';
        for (const well of Object.keys(wells)) {
          const opt = document.createElement('option');
          opt.value = well;
          opt.textContent = well;
          wellSelect.appendChild(opt);
        }
        wellSelect.disabled = false;
        runBtn.disabled = false;
      };
      reader.readAsText(file);
    });

    runBtn.addEventListener('click', () => {
      const well = wellSelect.value;
      if (!well || !parsedData) return;

      const { cycles, wells } = parsedData;
      const F_raw = wells[well];

      try {
        const res = linreg_ruijter4_final(cycles, F_raw);
        let txt = `Efficiency (E): ${res.E.toFixed(4)}   (${res.Eff_pct.toFixed(2)} %)\n`;
        txt += `Window of Linearity: cycles ${res.WoL_cycles.join(', ')} (width ${res.window_width})\n`;
        txt += `SDM cycle: ${res.SDM_final}\n`;
        txt += `Baseline (internal):  ${res.baseline.toFixed(2)}\n`;
        txt += `Background (robust):  ${res.background.toFixed(2)}\n`;
        txt += `Slope: ${res.slope.toFixed(6)}\n`;
        txt += `R²: ${res.R_squared.toFixed(4)}\n`;
        txt += `CV of slope: ${res.CV_slope.toFixed(6)}\n`;
        txt += `Converged: ${res.converged}`;
        resultText.textContent = txt;

        // ---------- Plot with DATA POINTS only (no line) ----------
        plotCanvas.style.display = 'block';
        const w = plotCanvas.width, h = plotCanvas.height;
        ctx.clearRect(0, 0, w, h);

        const margin = { top: 30, right: 30, bottom: 50, left: 60 };
        const plotW = w - margin.left - margin.right;
        const plotH = h - margin.top - margin.bottom;

        const xMin = 0, xMax = 45;
        const yMin = -2.5, yMax = 1.5;

        const scaleX = (x) => margin.left + (x - xMin) / (xMax - xMin) * plotW;
        const scaleY = (y) => margin.top + (yMax - y) / (yMax - yMin) * plotH;

        // Axes
        ctx.strokeStyle = '#000';
        ctx.beginPath();
        ctx.moveTo(margin.left, margin.top);
        ctx.lineTo(margin.left, h - margin.bottom);
        ctx.lineTo(w - margin.right, h - margin.bottom);
        ctx.stroke();

        // X ticks
        const xTicks = [0,5,10,15,20,25,30,35,40,45];
        ctx.fillStyle = '#000';
        ctx.textAlign = 'center';
        xTicks.forEach(tick => {
          const x = scaleX(tick);
          ctx.beginPath();
          ctx.moveTo(x, h - margin.bottom);
          ctx.lineTo(x, h - margin.bottom + 5);
          ctx.stroke();
          ctx.fillText(tick, x, h - margin.bottom + 20);
        });

        // Y ticks
        ctx.textAlign = 'right';
        for (let y = -2.5; y <= 1.5; y += 0.5) {
          ctx.fillText(y.toFixed(1), margin.left - 10, scaleY(y) + 4);
        }

        // Axis titles
        ctx.textAlign = 'center';
        ctx.fillText('Cycles', w / 2, h - 5);
        ctx.save();
        ctx.translate(15, h / 2);
        ctx.rotate(-Math.PI / 2);
        ctx.fillText('log(corrected fluor)', 0, 0);
        ctx.restore();

        // ---- Draw data points (small filled circles) ----
        const logF = res.F_corr.map(v => v <= 0 ? NaN : Math.log10(v));
        ctx.fillStyle = 'black';
        const pointRadius = 2.5;
        for (let i = 0; i < cycles.length; i++) {
          const yVal = logF[i];
          if (isNaN(yVal)) continue;
          const x = scaleX(cycles[i]);
          const y = scaleY(Math.max(yMin, Math.min(yMax, yVal)));
          ctx.beginPath();
          ctx.arc(x, y, pointRadius, 0, 2 * Math.PI);
          ctx.fill();
        }

        // Baseline: dashed blue horizontal line
        const baseY = scaleY(Math.log10(res.baseline));
        ctx.strokeStyle = 'blue';
        ctx.setLineDash([5, 5]);
        ctx.beginPath();
        ctx.moveTo(margin.left, baseY);
        ctx.lineTo(w - margin.right, baseY);
        ctx.stroke();
        ctx.setLineDash([]);

        // Window of Linearity: solid blue vertical lines
        if (res.WoL_cycles.length > 0) {
          const firstCycle = res.WoL_cycles[0];
          const lastCycle = res.WoL_cycles[res.WoL_cycles.length - 1];
          ctx.strokeStyle = 'blue';
          ctx.setLineDash([]);
          [firstCycle, lastCycle].forEach(c => {
            const x = scaleX(c);
            ctx.beginPath();
            ctx.moveTo(x, margin.top);
            ctx.lineTo(x, h - margin.bottom);
            ctx.stroke();
          });
        }

        // SDM_final: dotted orange vertical line
        if (!isNaN(res.SDM_final)) {
          const sdmX = scaleX(res.SDM_final);
          ctx.strokeStyle = 'orange';
          ctx.setLineDash([2, 3]);
          ctx.beginPath();
          ctx.moveTo(sdmX, margin.top);
          ctx.lineTo(sdmX, h - margin.bottom);
          ctx.stroke();
          ctx.setLineDash([]);
        }

      } catch (err) {
        resultText.textContent = '⚠️  LinRegPCR failed:\n' + err.message;
        plotCanvas.style.display = 'none';
      }
    });
  </script>
</body>
</html>

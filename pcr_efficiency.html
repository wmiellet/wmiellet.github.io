<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LinRegPCR Efficiency (no plot)</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; }
    button, select, input { margin: 0.3rem; }
    pre { background: #f5f5f5; padding: 1rem; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h2>LinRegPCR Efficiency (Ruijter original method) v0.14</h2>

  <label>Upload CSV/TSV file:</label><br>
  <input type="file" id="csvFile" accept=".csv,.tsv,.txt"><br>

  <label for="wellSelect">Select well:</label>
  <select id="wellSelect" disabled>
    <option>-- Upload file first --</option>
  </select><br>

  <button id="runBtn" disabled>Run LinRegPCR</button>
  <hr>

  <h3>Efficiency Result</h3>
  <pre id="resultText">Upload a file and click Run.</pre>

  <script type="module">
    // ----- Stable WebR version -----
    import { WebR } from 'https://webr.r-wasm.org/v0.4.1/webr.mjs';

    const webR = new WebR();
    await webR.init();

    // ----- DOM elements -----
    const fileInput   = document.getElementById('csvFile');
    const wellSelect  = document.getElementById('wellSelect');
    const runBtn      = document.getElementById('runBtn');
    const resultText  = document.getElementById('resultText');

    let csvContent = '';

    // ----- Pre‑define the linreg_ruijter4_final function globally -----
    await webR.evalR(`
      sg5_d2 <- function(y) {
        coef <- c(2, -1, -2, -1, 2) / 7
        n <- length(y)
        d2 <- rep(NA_real_, n)
        for (i in 3:(n - 2)) d2[i] <- sum(coef * y[(i - 2):(i + 2)])
        d2
      }

      linreg_ruijter4_final <- function(cycle, F_raw, tol = 1e-6) {
        early5 <- median(F_raw[1:min(5, length(F_raw))])
        if ((max(F_raw) - min(F_raw)) < 0.1 * early5) {
          return(list(
            baseline   = early5, background = early5,
            F_corr     = F_raw - early5,
            SDM_initial = NA_real_, SDM_final = NA_real_,
            WoL_cycles = NA_real_, window_width = NA_integer_,
            slope = NA_real_, E = 1.0, Eff_pct = 0,
            CV_slope = NA_real_, R_squared = NA_real_, converged = FALSE
          ))
        }
        B_init <- min(F_raw)
        F_corr_init <- F_raw - B_init
        pos <- F_corr_init[F_corr_init > 0]
        if (length(pos) == 0 || max(F_corr_init) < 7 * min(pos)) stop("No amplification")
        d2_init <- sg5_d2(F_corr_init)
        SDM_init <- which.max(d2_init)
        if (is.na(SDM_init) || SDM_init < 5) stop("SDM too early")
        widths_to_test <- c(4L, 6L)
        best_overall_CV <- Inf
        best_result <- NULL
        bg_median <- median(F_raw[1:min(5, length(F_raw))])
        for (width in widths_to_test) {
          start <- SDM_init - width
          if (start < 1) next
          WoL_tentative <- start:(SDM_init - 1)
          slope_diff_fn <- function(Bcur) {
            F_win <- F_raw[WoL_tentative] - Bcur
            if (any(F_win <= 0)) return(NA)
            lnF <- log(F_win)
            half <- width %/% 2L
            cyc <- cycle[WoL_tentative]
            fit_low  <- lm(lnF[1:half] ~ cyc[1:half])
            fit_upp  <- lm(lnF[(half+1):width] ~ cyc[(half+1):width])
            coef(fit_upp)[2] - coef(fit_low)[2]
          }
          Bcur <- B_init; best_diff <- Inf; best_B <- Bcur
          converged <- FALSE; B_found <- NULL
          for (iter in 1:100) {
            d <- slope_diff_fn(Bcur)
            if (is.na(d)) break
            ad <- abs(d)
            if (ad < best_diff) { best_diff <- ad; best_B <- Bcur }
            if (ad < tol) { B_found <- Bcur; converged <- TRUE; break }
            if (d > tol) { Bcur <- Bcur * 1.001 } else { Bcur <- Bcur * 0.999 }
          }
          if (!converged && best_diff < Inf) { B_found <- best_B; converged <- FALSE }
          if (is.null(B_found)) next
          F_corr <- F_raw - B_found
          d2_final <- sg5_d2(F_corr)
          SDM_final <- which.max(d2_final)
          if (is.na(SDM_final) || SDM_final < 5) next
          best_CV <- Inf; best_WoL <- NULL; best_fit <- NULL
          for (end in (SDM_final - 1):width) {
            start_w <- end - width + 1
            if (start_w < 1) break
            F_win <- F_corr[start_w:end]
            if (any(F_win <= 0)) next
            lnF <- log(F_win)
            cyc_win <- cycle[start_w:end]
            fit <- lm(lnF ~ cyc_win)
            s <- summary(fit)
            coefs <- s$coefficients
            if (any(is.na(coefs[,"Std. Error"]))) next
            slope <- coefs[2,1]; se <- coefs[2,2]
            if (slope == 0) next
            CV <- se / abs(slope)
            if (is.na(CV)) next
            if (CV < best_CV) {
              best_CV <- CV; best_WoL <- start_w:end
              best_fit <- fit; best_summary <- s
            }
          }
          if (is.null(best_WoL)) next
          slope <- coef(best_fit)[2]
          E <- exp(slope)
          candidate <- list(
            baseline = B_found, background = bg_median, F_corr = F_corr,
            SDM_initial = SDM_init, SDM_final = SDM_final,
            WoL_cycles = best_WoL, window_width = width,
            slope = slope, E = E, Eff_pct = (E - 1)*100,
            CV_slope = best_CV, R_squared = best_summary$r.squared,
            converged = converged
          )
          if (best_CV < best_overall_CV) {
            best_overall_CV <- best_CV; best_result <- candidate
          }
        }
        if (is.null(best_result)) stop("No valid window found")
        return(best_result)
      }
      "ready"
    `);

    // ----- File upload → populate well list -----
    fileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async (ev) => {
        csvContent = ev.target.result;
        const sep = csvContent.includes('\t') ? '\t' : ',';
        const firstLine = csvContent.split('\n')[0];
        const headers = firstLine.split(sep).map(h => h.trim().replace(/"/g, ''));
        wellSelect.innerHTML = '';
        for (let i = 1; i < headers.length; i++) {
          const opt = document.createElement('option');
          opt.value = headers[i];
          opt.textContent = headers[i];
          wellSelect.appendChild(opt);
        }
        wellSelect.disabled = false;
        runBtn.disabled = false;
      };
      reader.readAsText(file);
    });

    // ----- Run analysis (returns a result string) -----
    runBtn.addEventListener('click', async () => {
      const well = wellSelect.value;
      if (!well || !csvContent) return;

      runBtn.disabled = true;
      resultText.textContent = 'Running LinRegPCR …';

      try {
        await webR.FS.writeFile({ path: '/data.csv', data: csvContent });

        const rCode = `
          first_line <- readLines("data.csv", n = 1)
          sep <- if (grepl("\t", first_line)) "\t" else ","
          data <- read.table("data.csv", header = TRUE, sep = sep)

          # Use data[[well]] – works for both data.frame and data.table
          res <- tryCatch(
            linreg_ruijter4_final(data$Cycle, data[["${well}"]]),
            error = function(e) list(error = conditionMessage(e))
          )

          if (!is.null(res$error)) {
            paste0("error:", res$error)
          } else {
            paste0(
              "E:", round(res$E, 6), ";",
              "Eff_pct:", round(res$Eff_pct, 4), ";",
              "slope:", round(res$slope, 6), ";",
              "baseline:", round(res$baseline, 4), ";",
              "background:", round(res$background, 4), ";",
              "SDM_final:", res$SDM_final, ";",
              "WoL_cycles:", paste(res$WoL_cycles, collapse = ","), ";",
              "window_width:", res$window_width, ";",
              "CV_slope:", round(res$CV_slope, 6), ";",
              "R_squared:", round(res$R_squared, 6), ";",
              "converged:", res$converged
            )
          }
        `;

        // evalR returns a string – safe in v0.4.1
        const resultStr = await webR.evalR(rCode);

        // Parse the returned string (format: key:value;key:value;...)
        const kvPairs = resultStr.split(';').filter(s => s.includes(':'));
        const parsed = {};
        kvPairs.forEach(pair => {
          const [key, val] = pair.split(':');
          parsed[key.trim()] = val.trim();
        });

        if (parsed.error) {
          resultText.textContent = '⚠️  LinRegPCR failed:\n' + parsed.error;
        } else {
          let txt = '';
          if (parsed.E) {
            const E = parseFloat(parsed.E);
            txt += `Efficiency (E): ${E.toFixed(4)}   (${parseFloat(parsed.Eff_pct).toFixed(2)} %)\n`;
            txt += `Window of Linearity: cycles ${parsed.WoL_cycles} (width ${parsed.window_width})\n`;
            txt += `SDM cycle: ${parsed.SDM_final}\n`;
            txt += `Baseline (internal):  ${parseFloat(parsed.baseline).toFixed(2)}\n`;
            txt += `Background (robust):  ${parseFloat(parsed.background).toFixed(2)}\n`;
            txt += `Slope: ${parseFloat(parsed.slope).toFixed(6)}\n`;
            txt += `R²: ${parseFloat(parsed.R_squared).toFixed(4)}\n`;
            txt += `CV of slope: ${parseFloat(parsed.CV_slope).toFixed(6)}\n`;
            txt += `Converged: ${parsed.converged}`;
          }
          resultText.textContent = txt || 'Unknown result.';
        }
      } catch (err) {
        resultText.textContent = 'JavaScript error: ' + err.message;
        console.error(err);
      } finally {
        runBtn.disabled = false;
      }
    });
  </script>
</body>
</html>

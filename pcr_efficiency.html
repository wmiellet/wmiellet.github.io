<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>LinRegPCR – WebR (data.table, safe)</title>
  <style>
    body { font-family: sans-serif; max-width: 800px; margin: 2rem auto; }
    button, select, input { margin: 0.3rem; }
    #plotImage { border: 1px solid #ccc; margin-top: 1rem; max-width: 100%; }
    pre { background: #f5f5f5; padding: 1rem; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h2>LinRegPCR Efficiency – Ruijter method (data.table) v0.11</h2>

  <label>Upload CSV/TSV file:</label><br>
  <input type="file" id="csvFile" accept=".csv,.tsv,.txt"><br>

  <label for="wellSelect">Select well:</label>
  <select id="wellSelect" disabled>
    <option>-- Upload file first --</option>
  </select><br>

  <button id="runBtn" disabled>Run LinRegPCR</button>
  <hr>

  <h3>Efficiency Result</h3>
  <pre id="resultText">Upload a file and click Run.</pre>

  <h3>Plot</h3>
  <img id="plotImage" alt="Plot will appear here">

  <script type="module">
    import { WebR } from 'https://webr.r-wasm.org/latest/webr.mjs';

    const webR = new WebR();
    await webR.init();

    // ------ 1. Install data.table if needed ------
    await webR.evalR(`
      if (!requireNamespace("data.table", quietly = TRUE)) {
        webr::install("data.table")
      }
    `);

    // ------ 2. Pre‑define LinRegPCR functions globally ------
    await webR.evalR(`
      sg5_d2 <- function(y) {
        coef <- c(2, -1, -2, -1, 2) / 7
        n <- length(y)
        d2 <- rep(NA_real_, n)
        for (i in 3:(n - 2)) d2[i] <- sum(coef * y[(i - 2):(i + 2)])
        d2
      }

      linreg_ruijter4_final <- function(cycle, F_raw, tol = 1e-6) {
        early5 <- median(F_raw[1:min(5, length(F_raw))])
        if ((max(F_raw) - min(F_raw)) < 0.1 * early5) {
          return(list(
            baseline   = early5,
            background = early5,
            F_corr     = F_raw - early5,
            SDM_initial = NA_real_, SDM_final = NA_real_,
            WoL_cycles = NA_real_, window_width = NA_integer_,
            slope      = NA_real_,
            E          = 1.0,
            Eff_pct    = 0,
            CV_slope   = NA_real_,
            R_squared  = NA_real_,
            converged  = FALSE
          ))
        }

        B_init <- min(F_raw)
        F_corr_init <- F_raw - B_init

        pos <- F_corr_init[F_corr_init > 0]
        if (length(pos) == 0 || max(F_corr_init) < 7 * min(pos)) stop("No amplification")

        d2_init <- sg5_d2(F_corr_init)
        SDM_init <- which.max(d2_init)
        if (is.na(SDM_init) || SDM_init < 5) stop("SDM too early")

        widths_to_test <- c(4L, 6L)
        best_overall_CV <- Inf
        best_result <- NULL
        bg_median <- median(F_raw[1:min(5, length(F_raw))])

        for (width in widths_to_test) {
          start <- SDM_init - width
          if (start < 1) next

          WoL_tentative <- start:(SDM_init - 1)

          slope_diff_fn <- function(Bcur) {
            F_win <- F_raw[WoL_tentative] - Bcur
            if (any(F_win <= 0)) return(NA)
            lnF <- log(F_win)
            half <- width %/% 2L
            cyc <- cycle[WoL_tentative]
            fit_low <- lm(lnF[1:half] ~ cyc[1:half])
            fit_upp <- lm(lnF[(half + 1):width] ~ cyc[(half + 1):width])
            coef(fit_upp)[2] - coef(fit_low)[2]
          }

          Bcur <- B_init
          best_diff <- Inf
          best_B <- Bcur
          converged <- FALSE
          B_found <- NULL

          for (iter in 1:100) {
            d <- slope_diff_fn(Bcur)
            if (is.na(d)) break
            ad <- abs(d)
            if (ad < best_diff) { best_diff <- ad; best_B <- Bcur }
            if (ad < tol) { B_found <- Bcur; converged <- TRUE; break }
            if (d > tol) { Bcur <- Bcur * 1.001 } else { Bcur <- Bcur * 0.999 }
          }
          if (!converged && best_diff < Inf) { B_found <- best_B; converged <- FALSE }
          if (is.null(B_found)) next

          F_corr <- F_raw - B_found

          d2_final <- sg5_d2(F_corr)
          SDM_final <- which.max(d2_final)
          if (is.na(SDM_final) || SDM_final < 5) next

          best_CV <- Inf
          best_WoL <- NULL
          best_fit <- NULL
          for (end in (SDM_final - 1):width) {
            start_w <- end - width + 1
            if (start_w < 1) break
            F_win <- F_corr[start_w:end]
            if (any(F_win <= 0)) next
            lnF <- log(F_win)
            cyc_win <- cycle[start_w:end]
            fit <- lm(lnF ~ cyc_win)
            s <- summary(fit)
            coefs <- s$coefficients
            if (any(is.na(coefs[, "Std. Error"]))) next
            slope <- coefs[2, 1]; se <- coefs[2, 2]
            if (slope == 0) next
            CV <- se / abs(slope)
            if (is.na(CV)) next
            if (CV < best_CV) {
              best_CV <- CV; best_WoL <- start_w:end; best_fit <- fit; best_summary <- s
            }
          }
          if (is.null(best_WoL)) next

          slope <- coef(best_fit)[2]
          E <- exp(slope)
          candidate <- list(
            baseline     = B_found,
            background   = bg_median,
            F_corr       = F_corr,
            SDM_initial  = SDM_init,
            SDM_final    = SDM_final,
            WoL_cycles   = best_WoL,
            window_width = width,
            slope        = slope,
            E            = E,
            Eff_pct      = (E - 1) * 100,
            CV_slope     = best_CV,
            R_squared    = best_summary$r.squared,
            converged    = converged
          )
          if (best_CV < best_overall_CV) {
            best_overall_CV <- best_CV
            best_result <- candidate
          }
        }

        if (is.null(best_result)) stop("No valid window found for any tested width")
        return(best_result)
      }

      plotter <- function(data, well){
        res <- linreg_ruijter4_final(data$Cycle, data[, eval(as.name(noquote(well)))])
        png("plot.png", width = 600, height = 500)
        par(mar = c(4,4,2,1))
        plot(x = data$Cycle, y = log10(res$F_corr),
             ylim = c(-2.5, 1.5), xlab = "Cycles", ylab = "log(corrected fluor)", xaxt = "n")
        axis(side = 1, at = seq(0, max(data$Cycle), by = 5))
        abline(h = log10(res$baseline), lty = "dashed", col = "blue")
        abline(v = res$WoL_cycles[1], lty = "solid", col = "blue")
        abline(v = res$WoL_cycles[res$window_width], lty = "solid", col = "blue")
        abline(v = res$SDM_final, lty = "dotted", col = "orange")
        dev.off()
        return(res)
      }
    `);

    // ------ 3. DOM elements & file upload ------
    const fileInput   = document.getElementById('csvFile');
    const wellSelect  = document.getElementById('wellSelect');
    const runBtn      = document.getElementById('runBtn');
    const resultText  = document.getElementById('resultText');
    const plotImage   = document.getElementById('plotImage');

    let csvContent = '';

    fileInput.addEventListener('change', async (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = async (ev) => {
        csvContent = ev.target.result;
        const sep = csvContent.includes('\t') ? '\t' : ',';
        const firstLine = csvContent.split('\n')[0];
        const headers = firstLine.split(sep).map(h => h.trim().replace(/"/g, ''));
        wellSelect.innerHTML = '';
        for (let i = 1; i < headers.length; i++) {
          const opt = document.createElement('option');
          opt.value = headers[i];
          opt.textContent = headers[i];
          wellSelect.appendChild(opt);
        }
        wellSelect.disabled = false;
        runBtn.disabled = false;
      };
      reader.readAsText(file);
    });

    // ------ 4. Run analysis (returns a simple string) ------
    runBtn.addEventListener('click', async () => {
      const well = wellSelect.value;
      if (!well || !csvContent) return;

      runBtn.disabled = true;
      resultText.textContent = 'Running LinRegPCR …';
      plotImage.src = '';

      try {
        await webR.FS.writeFile({ path: '/data.csv', data: csvContent });

        // R script writes result.txt & plot.png, then returns "ok" or "error"
        const rRunCode = `
          library(data.table)

          output_status <- tryCatch({
            data <- fread("data.csv")
            res <- plotter(data, "${well}")

            # Build result.txt (key:value, no jsonlite)
            writeLines(c(
              paste0("E:", res$E),
              paste0("Eff_pct:", res$Eff_pct),
              paste0("slope:", res$slope),
              paste0("baseline:", res$baseline),
              paste0("background:", res$background),
              paste0("SDM_final:", res$SDM_final),
              paste0("WoL_cycles:", paste(res$WoL_cycles, collapse = ",")),
              paste0("window_width:", res$window_width),
              paste0("CV_slope:", res$CV_slope),
              paste0("R_squared:", res$R_squared),
              paste0("converged:", res$converged),
              "error:none"
            ), "result.txt")

            "ok"
          }, error = function(e) {
            # Placeholder plot for error
            png("plot.png", width = 600, height = 500)
            plot.new()
            text(0.5, 0.5, paste("Error:", conditionMessage(e)))
            dev.off()

            writeLines(c(
              "E:NA",
              "Eff_pct:NA",
              "slope:NA",
              "baseline:NA",
              "background:NA",
              "SDM_final:NA",
              "WoL_cycles:",
              "window_width:NA",
              "CV_slope:NA",
              "R_squared:NA",
              "converged:FALSE",
              paste0("error:", conditionMessage(e))
            ), "result.txt")

            "error"
          })

          # Return the status string – WebR safely converts it
          output_status
        `;

        // Evaluate the R code – we don't even need the return value,
        // but it must be a string to avoid the conversion error.
        await webR.evalR(rRunCode);

        // Read the generated files
        const resultRaw = await webR.FS.readFile('/result.txt', { encoding: 'utf8' });
        const plotArray = await webR.FS.readFile('/plot.png');

        // Parse the key:value lines
        const lines = resultRaw.split('\n').filter(line => line.trim() !== '');
        const result = {};
        lines.forEach(line => {
          const idx = line.indexOf(':');
          if (idx > 0) {
            const key = line.substring(0, idx).trim();
            const val = line.substring(idx + 1).trim();
            result[key] = val;
          }
        });

        // Display
        if (result.error && result.error !== 'none') {
          resultText.textContent = '⚠️  LinRegPCR failed for this well:\n' + result.error;
        } else {
          let txt = `Efficiency (E): ${parseFloat(result.E).toFixed(4)}   (${parseFloat(result.Eff_pct).toFixed(2)} %)\n`;
          txt += `Window of Linearity: cycles ${result.WoL_cycles} (width ${result.window_width})\n`;
          txt += `SDM cycle: ${result.SDM_final}\n`;
          txt += `Baseline (internal):  ${parseFloat(result.baseline).toFixed(2)}\n`;
          txt += `Background (robust):  ${parseFloat(result.background).toFixed(2)}\n`;
          txt += `Slope: ${parseFloat(result.slope).toFixed(6)}\n`;
          txt += `R²: ${parseFloat(result.R_squared).toFixed(4)}\n`;
          txt += `CV of slope: ${parseFloat(result.CV_slope).toFixed(6)}\n`;
          txt += `Converged: ${result.converged}`;
          resultText.textContent = txt;
        }

        const blob = new Blob([plotArray], { type: 'image/png' });
        plotImage.src = URL.createObjectURL(blob);
      } catch (err) {
        resultText.textContent = 'JavaScript error: ' + err.message;
        console.error(err);
      } finally {
        runBtn.disabled = false;
      }
    });
  </script>
</body>
</html>

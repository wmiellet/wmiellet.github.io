<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bland‑Altman Plot (Cq Values) v12.0</title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #progressContainer { width: 100%; max-width: 500px; margin: 15px 0; display: none; }
        .progress-bg { background: #e0e0e0; border-radius: 6px; height: 28px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: #4CAF50; border-radius: 6px;
                         text-align: center; color: white; line-height: 28px; font-weight: bold; }
        #statusMsg { margin: 10px 0; color: #555; font-style: italic; }
        #chart { width: 100%; height: 350px; }
    </style>
</head>
<body>
    <h1>Bland‑Altman Plot (Cq Values) v12.0</h1>
    <p>Upload a CSV with a header. The first two columns must be numeric Cq values.</p>

    <input type="file" id="csvFile" accept=".csv" />

    <div id="progressContainer">
        <div class="progress-bg">
            <div id="progressBar" class="progress-fill" style="width: 0%;">0%</div>
        </div>
        <div id="statusMsg"></div>
    </div>

    <div id="chart"></div>

    <script type="module">
        import { WebR } from 'https://webr.r-wasm.org/v0.4.0/webr.mjs';

        const fileInput   = document.getElementById('csvFile');
        const progBar     = document.getElementById('progressBar');
        const statusMsg   = document.getElementById('statusMsg');
        const progCont    = document.getElementById('progressContainer');
        const chartDiv    = document.getElementById('chart');

        function showProgress(pct, msg) {
            progCont.style.display = 'block';
            progBar.style.width = pct + '%';
            progBar.textContent = pct + '%';
            statusMsg.textContent = msg || '';
        }
        function hideProgress() {
            setTimeout(() => { progCont.style.display = 'none'; }, 1200);
        }

        const webR = new WebR();
        let Rready = false;

        // ---- Initialise R ----
        (async () => {
            try {
                showProgress(5, 'Starting R…');
                await webR.init();

                showProgress(20, 'Installing packages (data.table, jsonlite)…');
                await webR.evalR('webr::install(c("data.table", "jsonlite"))');

                showProgress(80, 'Loading libraries…');
                await webR.evalR('library(data.table); library(jsonlite)');

                Rready = true;
                showProgress(100, 'Ready. Please upload a CSV file.');
            } catch (e) {
                showProgress(0, 'R init failed: ' + e.message);
                console.error(e);
                Rready = false;
            } finally {
                hideProgress();
            }
        })();

        // ---- Decoder: clean UTF-8 ----
        async function decodeFileToCleanUTF8(file) {
            const buffer = await file.arrayBuffer();
            const bytes = new Uint8Array(buffer);

            if (bytes.length >= 2 && bytes[0] === 0x50 && bytes[1] === 0x4B) {
                throw new Error('This file appears to be an Excel (.xlsx) or ZIP archive. Please use "Save As → CSV UTF-8".');
            }

            let str;
            if (bytes.length >= 2 && bytes[0] === 0xFF && bytes[1] === 0xFE) {
                str = new TextDecoder('utf-16le').decode(bytes);
            } else if (bytes.length >= 2 && bytes[0] === 0xFE && bytes[1] === 0xFF) {
                str = new TextDecoder('utf-16be').decode(bytes);
            } else {
                str = new TextDecoder('utf-8').decode(bytes);
                if (str.includes('\0')) {
                    str = new TextDecoder('utf-16le').decode(bytes);
                    if (str.includes('\0')) {
                        str = new TextDecoder('utf-16be').decode(bytes);
                    }
                }
            }

            str = str.replace(/\0/g, '');
            const encoder = new TextEncoder();
            return encoder.encode(str);
        }

        // ---- Handle CSV upload ----
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            if (!Rready) {
                alert('R is not ready. Please wait and try again.');
                return;
            }

            try {
                showProgress(10, 'Reading file…');
                const utf8Bytes = await decodeFileToCleanUTF8(file);

                showProgress(40, 'Sending to R…');
                await webR.FS.writeFile('/home/data.csv', utf8Bytes);

                showProgress(60, 'Computing Bland‑Altman statistics (Cq < 40)…');
                chartDiv.innerHTML = '';

                // R: compute everything, return JSON
                const result = await webR.evalR(`
                    library(data.table)
                    library(jsonlite)

                    dt <- fread("/home/data.csv", header = TRUE)
                    setnames(dt, 1:2, c("Method1", "Method2"))
                    dt <- na.omit(dt[, .(Method1, Method2)])

                    dt[, mean_val := (Method1 + Method2) / 2]
                    dt[, diff_val := Method1 - Method2]
                    dt[, condition := Method1 < 40 & Method2 < 40]

                    # Subset for statistics
                    sub <- dt[condition == TRUE]
                    median_val <- median(sub$diff_val)
                    MAD_val <- median(abs(sub$diff_val - median_val))
                    loa_upper <- median_val + 1.96 * MAD_val
                    loa_lower <- median_val - 1.96 * MAD_val

                    toJSON(list(
                        means_all  = dt$mean_val,
                        diffs_all  = dt$diff_val,
                        condition  = dt$condition,
                        median     = median_val,
                        loa_upper  = loa_upper,
                        loa_lower  = loa_lower
                    ), auto_unbox = TRUE)
                `);

                // Parse the JSON string from webR
                const jsonStr = await result.toString();
                const d = JSON.parse(jsonStr);

                showProgress(80, 'Rendering plot…');

                // ---- Separate the two groups ----
                const xGreen = [], yGreen = [], xGrey = [], yGrey = [];
                for (let i = 0; i < d.condition.length; i++) {
                    const xi = d.means_all[i];
                    const yi = d.diffs_all[i];
                    if (d.condition[i]) {
                        xGreen.push(xi);
                        yGreen.push(yi);
                    } else {
                        xGrey.push(xi);
                        yGrey.push(yi);
                    }
                }

                // ---- Trace: points where both methods < 40 ----
                const traceGreen = {
                    x: xGreen,
                    y: yGreen,
                    type: 'scatter',
                    mode: 'markers',
                    marker: {
                        size: 8,               // ~ size 3 in R
                        color: 'seagreen1',
                        line: { color: 'seagreen', width: 1.5 }
                    },
                    opacity: 0.8,
                    name: 'Both < 40',
                    showlegend: false
                };

                // ---- Trace: all other points ----
                const traceGrey = {
                    x: xGrey,
                    y: yGrey,
                    type: 'scatter',
                    mode: 'markers',
                    marker: {
                        size: 6,
                        color: 'grey',
                        line: { color: 'darkgrey', width: 1.5 }
                    },
                    opacity: 0.4,
                    name: '≥ 40',
                    showlegend: false
                };

                // ---- Horizontal lines ----
                const xMin = 20, xMax = 42;   // fixed axis limits

                const lines = [];

                // median line (solid black, 0.5 alpha)
                lines.push({
                    x: [xMin, xMax],
                    y: [d.median, d.median],
                    type: 'scatter',
                    mode: 'lines',
                    line: { color: 'black', width: 1, dash: 'solid' },
                    opacity: 0.5,
                    name: 'Median',
                    showlegend: false
                });

                // median + 2 (solid red)
                lines.push({
                    x: [xMin, xMax],
                    y: [d.median + 2, d.median + 2],
                    type: 'scatter',
                    mode: 'lines',
                    line: { color: 'red', width: 2 },
                    name: 'Median + 2',
                    showlegend: false
                });

                // median - 2 (solid red)
                lines.push({
                    x: [xMin, xMax],
                    y: [d.median - 2, d.median - 2],
                    type: 'scatter',
                    mode: 'lines',
                    line: { color: 'red', width: 2 },
                    name: 'Median - 2',
                    showlegend: false
                });

                // LOA upper (dashed black, 0.5 alpha)
                lines.push({
                    x: [xMin, xMax],
                    y: [d.loa_upper, d.loa_upper],
                    type: 'scatter',
                    mode: 'lines',
                    line: { color: 'black', width: 1, dash: 'dash' },
                    opacity: 0.5,
                    name: 'Upper LOA',
                    showlegend: false
                });

                // LOA lower (dashed black, 0.5 alpha)
                lines.push({
                    x: [xMin, xMax],
                    y: [d.loa_lower, d.loa_lower],
                    type: 'scatter',
                    mode: 'lines',
                    line: { color: 'black', width: 1, dash: 'dash' },
                    opacity: 0.5,
                    name: 'Lower LOA',
                    showlegend: false
                });

                // zero line (solid black, thin, 0.25 alpha)
                lines.push({
                    x: [xMin, xMax],
                    y: [0, 0],
                    type: 'scatter',
                    mode: 'lines',
                    line: { color: 'black', width: 0.5 },
                    opacity: 0.25,
                    name: 'Zero',
                    showlegend: false
                });

                // ---- Layout ----
                const layout = {
                    title: 'Conditional dependence between genetic markers',
                    xaxis: {
                        title: 'Mean of two measurements [Cq]',
                        range: [20, 42],
                        dtick: 5,
                        tickvals: [20, 25, 30, 35, 40],
                        showgrid: false,
                        zeroline: false
                    },
                    yaxis: {
                        title: 'Difference (marker A - marker B [Cq])',
                        range: [-20, 20],
                        dtick: 5,
                        tickvals: [-20, -15, -10, -5, 0, 5, 10, 15, 20],
                        showgrid: false,
                        zeroline: false
                    },
                    width: 800,
                    height: 350,
                    margin: { l: 50, r: 20, b: 50, t: 40 },
                    hovermode: 'closest',
                    plot_bgcolor: 'white',
                    paper_bgcolor: 'white'
                };

                // Combine all traces
                const allTraces = [traceGreen, traceGrey, ...lines];
                Plotly.newPlot('chart', allTraces, layout);

                showProgress(100, 'Plot ready!');
            } catch (err) {
                console.error(err);
                showProgress(0, 'Error: ' + err.message);
                alert('Processing failed: ' + err.message);
            } finally {
                hideProgress();
            }
        });
    </script>
</body>
</html>

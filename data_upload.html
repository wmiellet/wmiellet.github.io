<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bland‑Altman Plot (Cq Values)</title>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #progressContainer { width: 100%; max-width: 500px; margin: 15px 0; display: none; }
        .progress-bg { background: #e0e0e0; border-radius: 6px; height: 28px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: #4CAF50; border-radius: 6px;
                         text-align: center; color: white; line-height: 28px; font-weight: bold; }
        #statusMsg { margin: 10px 0; color: #555; font-style: italic; }
        #plotContainer iframe { width: 100%; height: 600px; border: 1px solid #ddd; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Bland‑Altman Plot (Cq Values) v6.0 </h1>
    <p>Upload a CSV with a header. The first two columns must be numeric Cq values.</p>

    <input type="file" id="csvFile" accept=".csv" />

    <div id="progressContainer">
        <div class="progress-bg">
            <div id="progressBar" class="progress-fill" style="width: 0%;">0%</div>
        </div>
        <div id="statusMsg"></div>
    </div>

    <div id="plotContainer"></div>

    <script type="module">
        import { WebR } from 'https://webr.r-wasm.org/v0.4.0/webr.mjs';

        const fileInput   = document.getElementById('csvFile');
        const progBar     = document.getElementById('progressBar');
        const statusMsg   = document.getElementById('statusMsg');
        const progCont    = document.getElementById('progressContainer');
        const plotCont    = document.getElementById('plotContainer');

        function showProgress(pct, msg) {
            progCont.style.display = 'block';
            progBar.style.width = pct + '%';
            progBar.textContent = pct + '%';
            statusMsg.textContent = msg || '';
        }
        function hideProgress() {
            setTimeout(() => { progCont.style.display = 'none'; }, 1200);
        }

        const webR = new WebR();
        let Rready = false;

        // ---- Initialise R ----
        (async () => {
            try {
                showProgress(5, 'Starting R…');
                await webR.init();

                showProgress(20, 'Installing data.table and plotly…');
                await webR.evalR('webr::install(c("data.table", "plotly"))');

                showProgress(80, 'Loading libraries…');
                await webR.evalR('library(data.table); library(plotly)');

                Rready = true;
                showProgress(100, 'Ready. Please upload a CSV file.');
            } catch (e) {
                showProgress(0, 'R init failed: ' + e.message);
                console.error(e);
                Rready = false;
            } finally {
                hideProgress();
            }
        })();

        // ---- Robust decoder that guarantees no null bytes ----
        async function readFileAsUTF8(file) {
            const buffer = await file.arrayBuffer();
            const bytes = new Uint8Array(buffer);

            // 1. ZIP / Excel detection
            if (bytes.length >= 2 && bytes[0] === 0x50 && bytes[1] === 0x4B) {
                throw new Error(
                    'This file appears to be an Excel (.xlsx) or ZIP archive. ' +
                    'Please open it in Excel and use File → Save As → CSV UTF-8 (.csv).'
                );
            }

            // 2. Try common encodings, always fallback to UTF-16 LE
            let str;
            if (bytes.length >= 2 && bytes[0] === 0xFF && bytes[1] === 0xFE) {
                str = new TextDecoder('utf-16le').decode(bytes);
            } else if (bytes.length >= 2 && bytes[0] === 0xFE && bytes[1] === 0xFF) {
                str = new TextDecoder('utf-16be').decode(bytes);
            } else {
                // No BOM – start with UTF-8
                str = new TextDecoder('utf-8').decode(bytes);
                if (str.includes('\0')) {
                    // Try UTF-16 LE (most common Windows UCS-2)
                    str = new TextDecoder('utf-16le').decode(bytes);
                    if (str.includes('\0')) {
                        str = new TextDecoder('utf-16be').decode(bytes);
                    }
                }
            }

            // 3. AGGRESSIVELY remove any null bytes that might remain
            //    (e.g. from double-encoding or a corrupted BOM)
            str = str.replace(/\0/g, '');

            // 4. Log the first 200 chars for debugging (check in F12 console)
            console.log('Decoded CSV (first 200 chars):', str.substring(0, 200));

            // 5. If the string is empty or looks binary after cleaning, reject
            if (str.length === 0 || /^[\x00-\x08\x0B\x0C\x0E-\x1F]+$/.test(str.substring(0, 50))) {
                throw new Error(
                    'The file does not contain valid CSV text. ' +
                    'Try re‑saving it as "CSV UTF-8 (Comma delimited)" from Excel or R using write.csv(..., fileEncoding="UTF-8").'
                );
            }

            return str;
        }

        // ---- Handle CSV upload ----
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            if (!Rready) {
                alert('R is not ready. Please wait and try again.');
                return;
            }

            try {
                showProgress(10, 'Reading file and verifying format…');
                const csvText = await readFileAsUTF8(file);

                showProgress(40, 'Sending to R…');
                await webR.FS.writeFile('/home/data.csv', csvText);

                showProgress(60, 'Processing and generating plot…');
                plotCont.innerHTML = '';

                await webR.evalR(`
                    dt <- fread("/home/data.csv", header = TRUE)
                    setnames(dt, c("Method1", "Method2"), 1:2)
                    dt <- na.omit(dt[, .(Method1, Method2)])

                    dt[, means := (Method1 + Method2) / 2]
                    dt[, diffs := Method1 - Method2]
                    avg_diff <- dt[, mean(diffs)]
                    sd_diff  <- dt[, sd(diffs)]
                    upper_loa <- avg_diff + 1.96 * sd_diff
                    lower_loa <- avg_diff - 1.96 * sd_diff

                    p <- plot_ly(data = dt, x = ~means, y = ~diffs,
                                 type = 'scatter', mode = 'markers',
                                 marker = list(size = 6), name = 'Differences') %>%
                         add_lines(x = range(dt$means), y = avg_diff,
                                   line = list(color = 'blue', width = 2),
                                   name = sprintf('Mean diff = %.3f', avg_diff)) %>%
                         add_lines(x = range(dt$means), y = upper_loa,
                                   line = list(dash = 'dash', color = 'red', width = 1.5),
                                   name = sprintf('Upper LOA = %.3f', upper_loa)) %>%
                         add_lines(x = range(dt$means), y = lower_loa,
                                   line = list(dash = 'dash', color = 'red', width = 1.5),
                                   name = sprintf('Lower LOA = %.3f', lower_loa)) %>%
                         layout(title = 'Bland‑Altman Plot (Cq values)',
                                xaxis = list(title = 'Mean of Method1 and Method2'),
                                yaxis = list(title = 'Difference (Method1 − Method2)'))

                    htmlwidgets::saveWidget(p, "/home/plot.html", selfcontained = TRUE)
                `);

                showProgress(90, 'Loading chart…');
                const plotHtmlRaw = await webR.FS.readFile('/home/plot.html', { encoding: 'utf8' });
                const plotHtml = typeof plotHtmlRaw === 'string' ? plotHtmlRaw :
                                 new TextDecoder().decode(plotHtmlRaw);

                const iframe = document.createElement('iframe');
                iframe.srcdoc = plotHtml;
                iframe.style.width = '100%';
                iframe.style.height = '600px';
                iframe.style.border = 'none';
                plotCont.appendChild(iframe);

                showProgress(100, 'Plot ready!');
            } catch (err) {
                console.error(err);
                showProgress(0, 'Error: ' + err.message);
                alert('Processing failed: ' + err.message);
            } finally {
                hideProgress();
            }
        });
    </script>
</body>
</html>

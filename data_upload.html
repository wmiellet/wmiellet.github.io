<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bland‑Altman Plot (Cq Values) v11.0 </title>
    <script src="https://cdn.plot.ly/plotly-latest.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; }
        #progressContainer { width: 100%; max-width: 500px; margin: 15px 0; display: none; }
        .progress-bg { background: #e0e0e0; border-radius: 6px; height: 28px; overflow: hidden; }
        .progress-fill { width: 0%; height: 100%; background: #4CAF50; border-radius: 6px;
                         text-align: center; color: white; line-height: 28px; font-weight: bold; }
        #statusMsg { margin: 10px 0; color: #555; font-style: italic; }
        #chart { width: 100%; height: 600px; }
    </style>
</head>
<body>
    <h1>Bland‑Altman Plot (Cq Values) v11.0</h1>
    <p>Upload a CSV with a header. The first two columns must be numeric Cq values.</p>

    <input type="file" id="csvFile" accept=".csv" />

    <div id="progressContainer">
        <div class="progress-bg">
            <div id="progressBar" class="progress-fill" style="width: 0%;">0%</div>
        </div>
        <div id="statusMsg"></div>
    </div>

    <div id="chart"></div>

    <script type="module">
        import { WebR } from 'https://webr.r-wasm.org/v0.4.0/webr.mjs';

        const fileInput   = document.getElementById('csvFile');
        const progBar     = document.getElementById('progressBar');
        const statusMsg   = document.getElementById('statusMsg');
        const progCont    = document.getElementById('progressContainer');
        const chartDiv    = document.getElementById('chart');

        function showProgress(pct, msg) {
            progCont.style.display = 'block';
            progBar.style.width = pct + '%';
            progBar.textContent = pct + '%';
            statusMsg.textContent = msg || '';
        }
        function hideProgress() {
            setTimeout(() => { progCont.style.display = 'none'; }, 1200);
        }

        const webR = new WebR();
        let Rready = false;

        // ---- Initialise R (install data.table + jsonlite) ----
        (async () => {
            try {
                showProgress(5, 'Starting R…');
                await webR.init();

                showProgress(20, 'Installing packages (data.table, jsonlite)…');
                await webR.evalR('webr::install(c("data.table", "jsonlite"))');

                showProgress(80, 'Loading libraries…');
                await webR.evalR('library(data.table); library(jsonlite)');

                Rready = true;
                showProgress(100, 'Ready. Please upload a CSV file.');
            } catch (e) {
                showProgress(0, 'R init failed: ' + e.message);
                console.error(e);
                Rready = false;
            } finally {
                hideProgress();
            }
        })();

        // ---- Decoder: returns clean string and its UTF-8 bytes ----
        async function decodeFileToCleanUTF8(file) {
            const buffer = await file.arrayBuffer();
            const bytes = new Uint8Array(buffer);

            if (bytes.length >= 2 && bytes[0] === 0x50 && bytes[1] === 0x4B) {
                throw new Error('This file appears to be an Excel (.xlsx) or ZIP archive. Please use "Save As → CSV UTF-8".');
            }

            let str;
            if (bytes.length >= 2 && bytes[0] === 0xFF && bytes[1] === 0xFE) {
                str = new TextDecoder('utf-16le').decode(bytes);
            } else if (bytes.length >= 2 && bytes[0] === 0xFE && bytes[1] === 0xFF) {
                str = new TextDecoder('utf-16be').decode(bytes);
            } else {
                str = new TextDecoder('utf-8').decode(bytes);
                if (str.includes('\0')) {
                    str = new TextDecoder('utf-16le').decode(bytes);
                    if (str.includes('\0')) {
                        str = new TextDecoder('utf-16be').decode(bytes);
                    }
                }
            }

            str = str.replace(/\0/g, '');
            console.log('Decoded CSV (first 200 chars):', str.substring(0, 200));

            const encoder = new TextEncoder();
            const utf8Bytes = encoder.encode(str);
            return { str, utf8Bytes };
        }

        // ---- Handle CSV upload ----
        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            if (!Rready) {
                alert('R is not ready. Please wait and try again.');
                return;
            }

            try {
                showProgress(10, 'Reading file and converting to UTF-8…');
                const { utf8Bytes } = await decodeFileToCleanUTF8(file);

                showProgress(40, 'Writing clean UTF-8 to R…');
                await webR.FS.writeFile('/home/data.csv', utf8Bytes);

                showProgress(60, 'Calculating Bland‑Altman statistics in R…');
                chartDiv.innerHTML = '';

                // R: compute Bland‑Altman, return JSON string
                const result = await webR.evalR(`
                    library(data.table)
                    library(jsonlite)
                    dt <- fread("/home/data.csv", header = TRUE)
                    setnames(dt, 1:2, c("Method1", "Method2"))
                    dt <- na.omit(dt[, .(Method1, Method2)])

                    dt[, means := (Method1 + Method2) / 2]
                    dt[, diffs := Method1 - Method2]
                    avg_diff <- dt[, mean(diffs)]
                    sd_diff  <- dt[, sd(diffs)]
                    upper_loa <- avg_diff + 1.96 * sd_diff
                    lower_loa <- avg_diff - 1.96 * sd_diff

                    toJSON(list(
                        means = dt$means,
                        diffs = dt$diffs,
                        avg_diff = avg_diff,
                        upper_loa = upper_loa,
                        lower_loa = lower_loa
                    ), auto_unbox = TRUE)
                `);

                // webR returns a character vector; get the string
                const jsonStr = await result.toString();
                const plotData = JSON.parse(jsonStr);

                showProgress(80, 'Rendering Bland‑Altman chart…');

                // Build Plotly traces
                const scatter = {
                    x: plotData.means,
                    y: plotData.diffs,
                    type: 'scatter',
                    mode: 'markers',
                    marker: { size: 6 },
                    name: 'Differences'
                };

                const xMin = Math.min(...plotData.means);
                const xMax = Math.max(...plotData.means);

                const meanLine = {
                    x: [xMin, xMax],
                    y: [plotData.avg_diff, plotData.avg_diff],
                    type: 'scatter',
                    mode: 'lines',
                    line: { color: 'blue', width: 2 },
                    name: `Mean diff = ${plotData.avg_diff.toFixed(3)}`
                };

                const upperLine = {
                    x: [xMin, xMax],
                    y: [plotData.upper_loa, plotData.upper_loa],
                    type: 'scatter',
                    mode: 'lines',
                    line: { dash: 'dash', color: 'red', width: 1.5 },
                    name: `Upper LOA = ${plotData.upper_loa.toFixed(3)}`
                };

                const lowerLine = {
                    x: [xMin, xMax],
                    y: [plotData.lower_loa, plotData.lower_loa],
                    type: 'scatter',
                    mode: 'lines',
                    line: { dash: 'dash', color: 'red', width: 1.5 },
                    name: `Lower LOA = ${plotData.lower_loa.toFixed(3)}`
                };

                const layout = {
                    title: 'Bland‑Altman Plot (Cq values)',
                    xaxis: { title: 'Mean of Method1 and Method2' },
                    yaxis: { title: 'Difference (Method1 − Method2)' },
                    hovermode: 'closest'
                };

                Plotly.newPlot('chart', [scatter, meanLine, upperLine, lowerLine], layout);

                showProgress(100, 'Plot ready!');
            } catch (err) {
                console.error(err);
                showProgress(0, 'Error: ' + err.message);
                alert('Processing failed: ' + err.message);
            } finally {
                hideProgress();
            }
        });
    </script>
</body>
</html>
